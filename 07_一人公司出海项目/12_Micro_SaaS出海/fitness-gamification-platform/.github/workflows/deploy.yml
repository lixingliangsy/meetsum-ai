# GitHub Actions 部署工作流 - fitness-gamification-platform
# 使用说明：将此文件放在 .github/workflows/ 目录中

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        env:
          WAFFO_MERCHANT_ID: ${{ secrets.WAFFO_MERCHANT_ID }}
          WAFFO_PRIVATE_KEY: ${{ secrets.WAFFO_PRIVATE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fitness-gamification-platform
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
